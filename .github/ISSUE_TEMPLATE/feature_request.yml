name: Feature request
description: Suggest an idea or enhancement for frites
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the suggestion! Please describe the idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem would this solve, or what's the use case?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative approaches or workarounds you've thought about.
    validations:
      required: false
